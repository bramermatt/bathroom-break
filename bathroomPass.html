<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bathroom Pass Queue</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui; background:#f4f4f4; padding:1em; transition: background 0.5s; }
h1,h2 { margin:0; line-height:1em; }
select, input, button { padding:6px; margin:4px 0; }
.controls { margin-bottom:10px; }
.container { display:grid; grid-template-columns: repeat(5,1fr); gap:20px; transition: all 0.5s;}
.box { background:white; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,.1); transition: all 0.3s;}
ul { list-style:none; padding:0; }
li { padding:6px; margin:4px 0; margin-right: 1vw; background:#eaeaea; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; transition: all 0.3s; }
li:hover { background:#d6d6d6; }
.timer { font-size:0.85em; color:#555; }
.late { background:#ffcccc !important; }
.badge { background:#333; color:white; border-radius:12px; padding:2px 8px; font-size:0.75em; }
.locked { opacity:0.5; pointer-events:none; }
#todaysDate { font-weight:700; }
.shared-view { display: block; }


@media screen and (max-width: 1000px){
  .container { display:flex; flex-wrap:wrap; justify-content:space-between;}
  .box { flex:1 1 45%; margin-bottom:20px;}
}

/* PAGE MODES */
.teacher-mode .teacher-only { display:block; }
.teacher-mode .student-only { display:none; }
.student-mode .teacher-only { display:none; }
.student-mode .student-only { display:block; }

/* STUDENT MODE STYLING */
body.student-mode { background:#1a1a2e; color:#fff; }
body.student-mode .box { background:#162447; color:#fff; box-shadow:0 2px 10px rgba(0,0,0,.5);}
body.student-mode li { background:#1f4068; color:#fff; font-size:1.2em; justify-content:center;}
body.student-mode li:hover { background:#e43f5a; transform: scale(1.05);}
body.student-mode .timer { font-size:1em; font-weight:bold; color:#ffd166; }
body.student-mode button { background:#e43f5a; color:#fff; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-size:1.1em; }
body.student-mode button:hover { background:#ff7f50; }
</style>
</head>
<body>
<h1>Mr. Bramer's Bathroom Pass Queue</h1>
<p>Today's date: <span id="todaysDate"></span></p>

<!-- TEACHER CONTROLS -->
<div class="controls teacher-only">
  <label>Period:</label>
  <select id="periodSelect"></select>
  <button onclick="resetPeriod()">Reset Period</button>
  <button onclick="toggleLock()">Lock / Unlock</button>
  <button onclick="toggleTeacherStudentView()">Toggle Student View</button>
</div>

<!-- STUDENT REQUEST BUTTON -->
<div class="student-only" style="margin:10px 0;">
  <button id="requestRR">Request to RR</button>

<div class="controls">
  <button onclick="toggleTeacherStudentView()">Toggle Student View</button>
</div>

</div>

<div class="container">
  <div class="box teacher-only">
    <h2>Roster</h2>
    <ul id="roster"></ul>
  </div>
  <div class="box teacher-only">
    <h2>On-Deck</h2>
    <ul id="onDeck"></ul>
  </div>
  <div class="box teacher-only">
    <h2>Requests</h2>
    <ul id="requestsList"></ul>
  </div>
<div class="box shared-view">
  <h2>Out of Room</h2>
  <ul id="outList"></ul>
</div>
  <div class="box teacher-only">
    <h2>Completed</h2>
    <ul id="doneList"></ul>
  </div>
</div>

<script>
document.getElementById('todaysDate').textContent = new Date().toLocaleDateString();

// ===== URL MODE =====
const params = new URLSearchParams(window.location.search);
const urlView = params.get('view') || 'teacher';

document.body.classList.remove('teacher-mode', 'student-mode');
document.body.classList.add(urlView + '-mode');


// ===== CONFIG =====
const MAX_OUT_MINUTES = 5;
const ONE_OUT_ONLY = true;

// ===== PERIODS & ROSTERS =====
const periods = ["Period 1","Period 2","Period 3","Planning","Period 5","Period 6","Period 7"];
const rosters = {
  "Period 1":["Alice","Ben","Carlos","Diana"],
  "Period 2":["Ethan","Faith","Gavin","Hannah"],
  "Period 3":["Haylee","Jacqeline","Kevin","Lena"],
  "Planning":[""],
  "Period 5":["Quinn","Rosa","Sam","Tina"],
  "Period 6":["Uma","Victor","Will","Xander"],
  "Period 7":["Yara","Zane","Avery","Brooke"]
};

// ===== DATA =====
const data = {};
periods.forEach(p => {
  data[p] = { onDeck:[], out:[], done:[], requests:[], counts:{}, locked:false };
  rosters[p].forEach(n => data[p].counts[n]=0);
});

// ===== UI SETUP =====
const periodSelect = document.getElementById('periodSelect');
periods.forEach(p => { const o = document.createElement('option'); o.value=p; o.textContent=p; periodSelect.appendChild(o); });

// ===== QUEUE FUNCTIONS =====
function currentPeriod(){return data[periodSelect.value];}
function toggleLock(){currentPeriod().locked=!currentPeriod().locked; render();}
function resetPeriod(){if(!confirm('Reset all lists for this period?')) return; const p=currentPeriod(); p.onDeck=[]; p.out=[]; p.done=[]; p.requests=[]; render();}
function addToOnDeck(name){const p=currentPeriod(); if(p.locked) return; p.onDeck.push({name}); render();}
function moveToOut(i){const p=currentPeriod(); if(ONE_OUT_ONLY && p.out.length>0) return alert('Only one student out at a time'); const s=p.onDeck.splice(i,1)[0]; s.start=Date.now(); p.out.push(s); p.counts[s.name]++; render();}
function moveToDone(i){const p=currentPeriod(); const s=p.out.splice(i,1)[0]; s.end=Date.now(); s.duration=Math.floor((s.end-s.start)/1000); p.done.push(s); render();}

// ===== STUDENT REQUEST =====
function studentRequest(name){
  if(!name) name = prompt("Enter your name:");
  if(!name) return;
  const p=currentPeriod();
  p.requests.push({name,time:Date.now()});
  render();
}
const requestBtn=document.getElementById('requestRR');
if(requestBtn) requestBtn.onclick = () => studentRequest();

// ===== TEACHER TOGGLE VIEW =====
function toggleTeacherStudentView(){document.body.classList.toggle('student-mode');}

// ===== RENDER =====
function render(){
  const p = currentPeriod();
  const rosterEl = document.getElementById('roster');
  const onDeck = document.getElementById('onDeck');
  const outList = document.getElementById('outList');
  const doneList = document.getElementById('doneList');
  const requestsEl = document.getElementById('requestsList');

  rosterEl.innerHTML=''; onDeck.innerHTML=''; outList.innerHTML=' '; doneList.innerHTML=''; requestsEl.innerHTML='';

  rosterEl.className = p.locked?'locked':'';

  rosters[periodSelect.value].forEach(n=>{
    const li=document.createElement('li');
    li.innerHTML=`${n} <span class="badge">${p.counts[n]}</span>`;
    li.onclick=()=>addToOnDeck(n);
    rosterEl.appendChild(li);
  });

  p.onDeck.forEach((s,i)=>{
    const li=document.createElement('li');
    li.textContent = s.name;
    li.onclick=()=>moveToOut(i);
    onDeck.appendChild(li);
  });

  p.requests.forEach((r,i)=>{
    const li=document.createElement('li');
    const time = new Date(r.time).toLocaleTimeString();
    li.innerHTML=`${r.name} <span class="timer">${time}</span>`;
    li.onclick=()=>{ addToOnDeck(r.name); p.requests.splice(i,1); render(); };
    requestsEl.appendChild(li);
  });

  p.out.forEach((s,i)=>{
    const elapsed=Math.floor((Date.now()-s.start)/1000);
    const li=document.createElement('li');
    if(elapsed>MAX_OUT_MINUTES*60) li.classList.add('late');
    li.innerHTML=`${s.name} - <span class="timer">${elapsed}s</span>`;
    li.onclick=()=>moveToDone(i);
    outList.appendChild(li);
  });

  p.done.forEach(s=>{
    const li=document.createElement('li');
    li.textContent=`${s.name} – ${s.duration}s`;
    doneList.appendChild(li);
  });
}

function toggleTeacherStudentView() {
  if (document.body.classList.contains('student-mode')) {
    document.body.classList.remove('student-mode');
    document.body.classList.add('teacher-mode');
  } else {
    document.body.classList.remove('teacher-mode');
    document.body.classList.add('student-mode');
  }
}


setInterval(render,1000);
render();
</script>
</body>
</html>
